<section id="contact">
  <h2 class="section-title reveal">Get In Touch</h2>
  <p class="section-subtitle reveal">Let's connect and collaborate</p>
  <div class="contact-wrapper">
    <div class="contact-cards">
      <a [href]="emailLink" target="_blank" rel="noopener noreferrer" class="contact-card reveal">
        <i class="fas fa-envelope"></i>
        <h4>Email</h4>
        <p>{{ email }}</p>
      </a>
      <a [href]="'tel:' + phone" class="contact-card reveal">
        <i class="fas fa-phone"></i>
        <h4>Phone</h4>
        <p>{{ phoneDisplay }}</p>
      </a>
      <a [href]="linkedin" target="_blank" rel="noopener noreferrer" class="contact-card reveal">
        <i class="fab fa-linkedin"></i>
        <h4>LinkedIn</h4>
        <p>Kareem Gamal</p>
      </a>
    </div>

    <div class="social-icons reveal">
      <a [href]="emailLink" target="_blank" rel="noopener noreferrer" title="Email"><i class="fas fa-envelope"></i></a>
      <a [href]="'tel:' + phone" title="Phone"><i class="fas fa-phone"></i></a>
      <a [href]="linkedin" target="_blank" rel="noopener noreferrer" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a [href]="github" target="_blank" rel="noopener noreferrer" title="GitHub"><i class="fab fa-github"></i></a>
    </div>
  </div>
</section>
